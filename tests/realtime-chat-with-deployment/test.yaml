contributor_url: https://github.com/tin-cat
name: realtime-chat-with-deployment
title: A real-time chat app with automated deployment.
description: |
  A WebSocket-based chat application with multiple rooms, presence, and basic moderation. Builds from a single shared room up to a moderated multi-room app. Includes automated deployment to AWS for a complete development-to-live workflow.
domain: full-stack-web
stack: node-express

stages:
  - id: stage-1-first-run
    theme: bootstrap
    prompt: |
      Build a real-time chat app: a backend built with Node and Express (use the `ws` library for the WebSocket server) and a minimal web client. Anyone who opens the page picks a display name and joins one shared room. Messages broadcast to all connected clients in real time and the last 50 messages are kept in memory and replayed to new joiners. Show a simple message list and an input box.

  - id: stage-2-rooms
    builds_on: stage-1-first-run
    theme: features
    prompt: |
      Add named rooms: the URL hash (#room-name) selects the room, and messages are scoped to that room. Show the current room name and let users switch rooms without reloading. Persist messages per room to SQLite so history survives a server restart (keep the last 200 per room).

  - id: stage-3-presence
    builds_on: stage-2-rooms
    theme: features
    prompt: |
      Add presence: show a live list of who is in the current room, broadcast join/leave system messages, and show a "typing…" indicator. Handle disconnects cleanly (remove the user from presence after a short grace period).

  - id: stage-4-moderation
    builds_on: stage-3-presence
    theme: security
    prompt: |
      Add lightweight moderation: a per-room rate limit (max 5 messages / 10s per user), a configurable banned-word filter that masks matches, and a message length cap. Sanitize all message content so it cannot inject HTML in the client. Add a simple admin token that can clear a room's history via an authenticated endpoint.

  - id: stage-5-deploy-aws
    builds_on: stage-4-moderation
    theme: extension
    prompt: |
      Make the whole app deployable to AWS with a single command. Provide infrastructure-as-code (e.g. AWS CDK, CloudFormation, or Terraform) plus a documented deploy script so a user with their own AWS account and credentials can set the app running from scratch — the WebSocket server, the static web client, and a publicly reachable HTTPS URL — without manual console clicking. The SQLite room history must live on durable storage (a mounted volume or equivalent) so it survives redeploys. Re-running the deploy after code changes must update the app in place without dropping existing message history or other persisted data. Document the required prerequisites, environment variables (including the admin token), and the deployment commands. Sensible tokens and keys must not be committed.
